const ICONS = { nomina: "[N]", certificado: "[C]" };

function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById('username').value.trim().toLowerCase();
  const pass = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');

  const emp = EMPLEADOS[user];
  if (!emp || emp.password !== pass) {
    errorMsg.textContent = 'Usuario o contraseña incorrectos';
    return false;
  }

  errorMsg.textContent = '';
  showDashboard(user, emp);
  return false;
}

function showDashboard(username, emp) {
  document.getElementById('authCard').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  document.getElementById('empName').textContent = emp.nombre;
  document.getElementById('empCargo').textContent = emp.cargo + ' · ' + (emp.puesto || '');
  document.getElementById('empCedula').textContent = emp.cedula;

  const list = document.getElementById('docsList');
  if (!emp.documentos.length) {
    list.innerHTML = '<div class="empty-state">No hay documentos disponibles por el momento.</div>';
    return;
  }

  list.innerHTML = emp.documentos.map(function(doc) {
    return '<div class="doc-item">' +
      '<div class="doc-info">' +
        '<div class="doc-icon">' + (ICONS[doc.tipo] || '[D]') + '</div>' +
        '<div><div class="doc-name">' + doc.nombre + '</div></div>' +
      '</div>' +
      '<a class="btn-download" href="javascript:void(0)" onclick="generarPDF(\'' + username + '\',\'' + doc.action + '\')">Descargar</a>' +
    '</div>';
  }).join('');
}

/* ══ GENERACIÓN DE PDFs (CERTIFICADO LABORAL / COMPROBANTE DE NÓMINA) ══ */
function pdfHeader(doc, titulo) {
  doc.setFillColor(20, 20, 23);
  doc.rect(0, 0, 210, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(15);
  doc.text('9ONCE SEGURIDAD LTDA', 14, 14);
  doc.setTextColor(200, 168, 75); doc.setFontSize(10);
  doc.text('NIT 900.XXX.XXX-X · Bogotá D.C., Colombia', 14, 21);
  doc.setTextColor(255,255,255); doc.setFontSize(11);
  doc.text(titulo, 14, 27);
  doc.setTextColor(20, 20, 23);
  return 42;
}
function pdfFooter(doc) {
  doc.setFontSize(8); doc.setTextColor(140,140,140);
  doc.text('Documento generado digitalmente por el Portal de Empleados de 9Once Seguridad Ltda · ' + new Date().toLocaleString('es-CO'), 14, 285);
}

function generarPDF(username, action) {
  const emp = EMPLEADOS[username];
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const hoy = new Date().toLocaleDateString('es-CO', {year:'numeric',month:'long',day:'numeric'});

  if (action === 'cert') {
    let y = pdfHeader(doc, 'CERTIFICADO LABORAL');
    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    const texto = `EL DEPARTAMENTO DE TALENTO HUMANO DE 9ONCE SEGURIDAD LTDA CERTIFICA:\n\n` +
      `Que el(la) señor(a) ${emp.nombre.toUpperCase()}, identificado(a) con cédula de ciudadanía No. ${emp.cedula}, ` +
      `labora actualmente en nuestra empresa desempeñando el cargo de ${emp.cargo.toUpperCase()}, ` +
      `prestando sus servicios en el puesto asignado: ${emp.puesto}.\n\n` +
      `El presente certificado se expide a solicitud del interesado para los fines que estime convenientes, ` +
      `a los ${hoy}.`;
    const lines = doc.splitTextToSize(texto, 182);
    doc.text(lines, 14, y+8);
    y += 8 + lines.length*6 + 20;
    doc.setFont('helvetica','bold');
    doc.text('_____________________________', 14, y);
    doc.text('Talento Humano', 14, y+6);
    doc.text('9Once Seguridad Ltda', 14, y+12);
    pdfFooter(doc);
    doc.save('Certificado_Laboral_' + emp.nombre.replace(/\s+/g,'_') + '.pdf');
  }

  if (action === 'nomina') {
    let y = pdfHeader(doc, 'COMPROBANTE DE PAGO DE NÓMINA');
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    const rows = [
      ['Nombre', emp.nombre],
      ['Cédula', emp.cedula],
      ['Cargo', emp.cargo],
      ['Puesto', emp.puesto],
      ['Periodo de pago', '01/05/2026 - 31/05/2026'],
      ['Fecha de pago', '05/06/2026'],
    ];
    rows.forEach(([k,v])=>{
      doc.setFont('helvetica','bold'); doc.text(k+':', 14, y);
      doc.setFont('helvetica','normal'); doc.text(String(v), 60, y);
      y += 7;
    });
    y += 4;
    doc.setFillColor(168,32,48); doc.rect(14, y-5, 182, 7, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text('CONCEPTO', 18, y); doc.text('VALOR (COP)', 160, y);
    doc.setTextColor(20,20,23);
    y += 9;
    const conceptos = [
      ['Salario básico', '$ 1.423.500'],
      ['Auxilio de transporte', '$ 200.000'],
      ['Recargos nocturnos / dominicales', '$ 180.000'],
      ['Total devengado', '$ 1.803.500'],
      ['(-) Salud (4%)', '$ 56.940'],
      ['(-) Pensión (4%)', '$ 56.940'],
      ['Total a pagar', '$ 1.689.620'],
    ];
    doc.setFont('helvetica','normal');
    conceptos.forEach(([k,v],i)=>{
      if(i===conceptos.length-1 || k.startsWith('Total')){doc.setFont('helvetica','bold');}else{doc.setFont('helvetica','normal');}
      doc.text(k, 18, y); doc.text(v, 160, y);
      y += 7;
    });
    y += 14;
    doc.setFont('helvetica','italic'); doc.setFontSize(8);
    doc.text('Valores de referencia generados para fines demostrativos del sistema.', 14, y);
    pdfFooter(doc);
    doc.save('Comprobante_Nomina_' + emp.nombre.replace(/\s+/g,'_') + '.pdf');
  }
}

  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('authCard').style.display = 'block';
