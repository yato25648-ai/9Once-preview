<!DOCTYPE html>

<style>
  :root {
    --crimson: #6b1020;
    --crimson-dark: #4a0a15;
    --crimson-light: #8b1a2e;
    --silver: #c8c8c8;
    --silver-light: #e8e8e8;
    --dark: #0e0e0e;
    --dark-mid: #1a1a1a;
    --dark-card: #111111;
    --white: #f5f5f5;
    --text-muted: #999;
    --gold: #c8a84b;
    --success: #2d7a2d;
    --danger: #a8222f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 20px 40px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(107,16,32,0.18), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(107,16,32,0.12), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .top-bar {
    position: fixed; top: 0; left: 0; width: 100%;
    padding: 18px 5%;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(107,16,32,0.3);
  }
  .top-bar a.back-link {
    font-family: 'Oswald', sans-serif;
    font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--silver); text-decoration: none;
    border: 1px solid rgba(200,200,200,0.25);
    padding: 8px 18px; border-radius: 4px;
    transition: 0.2s;
  }
  .top-bar a.back-link:hover { color: var(--white); border-color: var(--crimson-light); }
  .top-brand {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    letter-spacing: 1px; font-size: 1.1rem; color: var(--white);
  }
  .top-brand span { color: var(--crimson-light); }

  .auth-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    background: var(--dark-card);
    border: 1px solid rgba(107,16,32,0.4);
    border-radius: 12px;
    padding: 44px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
  }
  .auth-card .icon-wrap {
    width: 64px; height: 64px; margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--crimson), var(--crimson-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 0 30px rgba(107,16,32,0.5);
  }
  .auth-card h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem; letter-spacing: 3px;
    color: var(--white); margin-bottom: 4px;
  }
  .auth-card h1 span { color: var(--crimson-light); }
  .auth-card .subtitle {
    font-size: 0.85rem; color: var(--text-muted);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 30px;
  }
  .field { text-align: left; margin-bottom: 18px; }
  .field label {
    display: block; font-family: 'Oswald', sans-serif;
    font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--silver); margin-bottom: 8px;
  }
  .field input {
    width: 100%; padding: 13px 14px;
    background: var(--dark-mid);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--white); font-size: 0.95rem;
    font-family: 'Lato', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    outline: none; border-color: var(--crimson-light);
    box-shadow: 0 0 0 3px rgba(107,16,32,0.25);
  }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--crimson), var(--crimson-light));
    border: none; border-radius: 6px;
    color: var(--white); font-family: 'Oswald', sans-serif;
    font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 600; cursor: pointer;
    transition: filter 0.2s, transform 0.2s;
    margin-top: 6px;
  }
  .btn-login:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .error-msg {
    margin-top: 14px; font-size: 0.85rem;
    color: #ff8a8a; min-height: 18px;
  }
  .auth-footer {
    margin-top: 26px; padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 0.78rem; color: var(--text-muted); line-height: 1.6;
  }

  .dashboard {
    display: none;
    position: relative; z-index: 1;
    width: 100%; max-width: 760px;
    margin: 0 auto;
  }
  .dash-header {
    background: var(--dark-card);
    border: 1px solid rgba(107,16,32,0.4);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .dash-header .info h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem; letter-spacing: 2px; color: var(--white);
    margin-bottom: 4px;
  }
  .dash-header .info p {
    font-size: 0.85rem; color: var(--silver);
    letter-spacing: 0.5px;
  }
  .dash-header .info p span { color: var(--gold); }
  .btn-logout {
    background: transparent; border: 1px solid rgba(200,200,200,0.25);
    color: var(--silver); padding: 10px 22px;
    font-family: 'Oswald', sans-serif; font-size: 0.78rem;
    letter-spacing: 2px; text-transform: uppercase;
    border-radius: 6px; cursor: pointer; transition: 0.2s;
  }
  .btn-logout:hover { color: var(--white); border-color: var(--crimson-light); background: rgba(107,16,32,0.15); }

  .docs-section {
    background: var(--dark-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 28px 32px;
  }
  .docs-section h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--crimson-light); margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .docs-section h3::after {
    content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
  }
  .doc-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px;
    background: var(--dark-mid);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    margin-bottom: 12px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .doc-item:hover { border-color: rgba(107,16,32,0.5); transform: translateX(2px); }
  .doc-item .doc-info { display: flex; align-items: center; gap: 14px; }
  .doc-item .doc-icon {
    width: 38px; height: 38px; border-radius: 8px;
    background: rgba(107,16,32,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .doc-item .doc-name {
    font-family: 'Oswald', sans-serif; font-size: 0.95rem;
    color: var(--white); letter-spacing: 0.5px;
  }
  .doc-item a.btn-download {
    background: var(--crimson);
    color: var(--white); text-decoration: none;
    padding: 9px 18px; border-radius: 6px;
    font-family: 'Oswald', sans-serif; font-size: 0.75rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: 0.2s; white-space: nowrap;
  }
  .doc-item a.btn-download:hover { background: var(--crimson-light); }
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-size: 0.9rem;
  }

  @media (max-width: 600px) {
    .dash-header, .docs-section { padding: 22px 18px; }
    .doc-item { flex-direction: column; align-items: flex-start; gap: 12px; }
    .doc-item a.btn-download { width: 100%; text-align: center; }
    body { padding: 90px 14px 30px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-brand">9<span>ONCE</span> SEGURIDAD</div>
  <a class="back-link" href="9ONCE_PAGINA_WEB.html">&larr; Volver al sitio</a>
</div>

<div class="auth-card" id="authCard">
  <div class="icon-wrap">🔒</div>
  <h1>Portal de <span>Empleados</span></h1>
  <div class="subtitle">9Once Seguridad Ltda</div>

  <form id="loginForm" onsubmit="return handleLogin(event)">
    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Ingresar &rarr;</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="auth-footer">
    Acceso exclusivo para personal vinculado a 9Once Seguridad.<br>
    Si olvido su contraseña, comuniquese con Talento Humano.<br><br>
    <span style="color:var(--gold)">Demo:</span> usuario <b>mario</b> · contraseña <b>3234953988</b>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div class="info">
      <h2 id="empName">-</h2>
      <p>Cargo: <span id="empCargo">-</span> &middot; Cedula: <span id="empCedula">-</span></p>
    </div>
    <button class="btn-logout" onclick="handleLogout()">Cerrar sesion</button>
  </div>

  <div class="docs-section">
    <h3>Mis Documentos</h3>
    <div id="docsList"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   BASE DE DATOS DE EMPLEADOS (DEMO con datos reales de la programación)
   Usuario = primer nombre en minúsculas
   Contraseña (cédula simulada) = número de celular sin espacios, solo para esta demo.
   En producción reemplazar por cédulas reales y hashear contraseñas en backend.
   ════════════════════════════════════════════════════════ */

const EMPLEADOS = {
  "carlos": {
    password: "3125817125",
    nombre: "Carlos Guzman",
    cargo: "Guarda de Seguridad",
    cedula: "3125817125",
    puesto: "Libertadores (Apolo 5)",
    documentos: [
      { nombre: "Certificado Laboral 2026", tipo: "certificado", action: "cert" },
      { nombre: "Comprobante de Nómina - Mayo 2026", tipo: "nomina", action: "nomina" }
    ]
  },
  "angel": {
    password: "3112534263",
    nombre: "Angel Johan",
    cargo: "Guarda de Seguridad",
    cedula: "3112534263",
    puesto: "Libertadores (Apolo 5)",
    documentos: [
      { nombre: "Certificado Laboral 2026", tipo: "certificado", action: "cert" },
      { nombre: "Comprobante de Nómina - Mayo 2026", tipo: "nomina", action: "nomina" }
    ]
  },
  "mario": {
    password: "3234953988",
    nombre: "Mario Bonilla",
    cargo: "Guarda de Seguridad",
    cedula: "3234953988",
    puesto: "Senderos Sector 2 (Apolo 19)",
    documentos: [
      { nombre: "Certificado Laboral 2026", tipo: "certificado", action: "cert" },
      { nombre: "Comprobante de Nómina - Mayo 2026", tipo: "nomina", action: "nomina" }
    ]
  },
  "esmeli": {
    password: "3028471333",
    nombre: "Esmeli Morales",
    cargo: "Guarda de Seguridad",
    cedula: "3028471333",
    puesto: "Cabañas Norte (Apolo 25)",
    documentos: [
      { nombre: "Certificado Laboral 2026", tipo: "certificado", action: "cert" },
      { nombre: "Comprobante de Nómina - Mayo 2026", tipo: "nomina", action: "nomina" }
    ]
  },
  "jose": {
    password: "3108742058",
    nombre: "Jose Emilio Aguiar",
    cargo: "Guarda de Seguridad",
    cedula: "3108742058",
    puesto: "Cabañas Norte (Apolo 25)",
    documentos: [
      { nombre: "Certificado Laboral 2026", tipo: "certificado", action: "cert" },
      { nombre: "Comprobante de Nómina - Mayo 2026", tipo: "nomina", action: "nomina" }
    ]
  },
  "jorge": {
    password: "3223456092",
    nombre: "Jorge Beltran",
    cargo: "Guarda de Seguridad",
    cedula: "3223456092",
    puesto: "Senderos Sector 3 (Apolo 20)",
    documentos: [
      { nombre: "Certificado Laboral 2026", tipo: "certificado", action: "cert" },
      { nombre: "Comprobante de Nómina - Mayo 2026", tipo: "nomina", action: "nomina" }
    ]
  },
  "admin": {
    password: "legion2026",
    nombre: "Administrador",
    cargo: "Recursos Humanos",
    cedula: "-",
    puesto: "Administración",
    documentos: []
  }
};

const ICONS = { nomina: "[N]", certificado: "[C]" };

function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById('username').value.trim().toLowerCase();
  const pass = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');

  const emp = EMPLEADOS[user];
  if (!emp || emp.password !== pass) {
    errorMsg.textContent = 'Usuario o contraseña incorrectos';
    return false;
  }

  errorMsg.textContent = '';
  showDashboard(user, emp);
  return false;
}

function showDashboard(username, emp) {
  document.getElementById('authCard').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  document.getElementById('empName').textContent = emp.nombre;
  document.getElementById('empCargo').textContent = emp.cargo + ' · ' + (emp.puesto || '');
  document.getElementById('empCedula').textContent = emp.cedula;

  const list = document.getElementById('docsList');
  if (!emp.documentos.length) {
    list.innerHTML = '<div class="empty-state">No hay documentos disponibles por el momento.</div>';
    return;
  }

  list.innerHTML = emp.documentos.map(function(doc) {
    return '<div class="doc-item">' +
      '<div class="doc-info">' +
        '<div class="doc-icon">' + (ICONS[doc.tipo] || '[D]') + '</div>' +
        '<div><div class="doc-name">' + doc.nombre + '</div></div>' +
      '</div>' +
      '<a class="btn-download" href="javascript:void(0)" onclick="generarPDF(\'' + username + '\',\'' + doc.action + '\')">Descargar</a>' +
    '</div>';
  }).join('');
}

/* ══ GENERACIÓN DE PDFs (CERTIFICADO LABORAL / COMPROBANTE DE NÓMINA) ══ */
function pdfHeader(doc, titulo) {
  doc.setFillColor(20, 20, 23);
  doc.rect(0, 0, 210, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(15);
  doc.text('9ONCE SEGURIDAD LTDA', 14, 14);
  doc.setTextColor(200, 168, 75); doc.setFontSize(10);
  doc.text('NIT 900.XXX.XXX-X · Bogotá D.C., Colombia', 14, 21);
  doc.setTextColor(255,255,255); doc.setFontSize(11);
  doc.text(titulo, 14, 27);
  doc.setTextColor(20, 20, 23);
  return 42;
}
function pdfFooter(doc) {
  doc.setFontSize(8); doc.setTextColor(140,140,140);
  doc.text('Documento generado digitalmente por el Portal de Empleados de 9Once Seguridad Ltda · ' + new Date().toLocaleString('es-CO'), 14, 285);
}

function generarPDF(username, action) {
  const emp = EMPLEADOS[username];
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const hoy = new Date().toLocaleDateString('es-CO', {year:'numeric',month:'long',day:'numeric'});

  if (action === 'cert') {
    let y = pdfHeader(doc, 'CERTIFICADO LABORAL');
    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    const texto = `EL DEPARTAMENTO DE TALENTO HUMANO DE 9ONCE SEGURIDAD LTDA CERTIFICA:\n\n` +
      `Que el(la) señor(a) ${emp.nombre.toUpperCase()}, identificado(a) con cédula de ciudadanía No. ${emp.cedula}, ` +
      `labora actualmente en nuestra empresa desempeñando el cargo de ${emp.cargo.toUpperCase()}, ` +
      `prestando sus servicios en el puesto asignado: ${emp.puesto}.\n\n` +
      `El presente certificado se expide a solicitud del interesado para los fines que estime convenientes, ` +
      `a los ${hoy}.`;
    const lines = doc.splitTextToSize(texto, 182);
    doc.text(lines, 14, y+8);
    y += 8 + lines.length*6 + 20;
    doc.setFont('helvetica','bold');
    doc.text('_____________________________', 14, y);
    doc.text('Talento Humano', 14, y+6);
    doc.text('9Once Seguridad Ltda', 14, y+12);
    pdfFooter(doc);
    doc.save('Certificado_Laboral_' + emp.nombre.replace(/\s+/g,'_') + '.pdf');
  }

  if (action === 'nomina') {
    let y = pdfHeader(doc, 'COMPROBANTE DE PAGO DE NÓMINA');
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    const rows = [
      ['Nombre', emp.nombre],
      ['Cédula', emp.cedula],
      ['Cargo', emp.cargo],
      ['Puesto', emp.puesto],
      ['Periodo de pago', '01/05/2026 - 31/05/2026'],
      ['Fecha de pago', '05/06/2026'],
    ];
    rows.forEach(([k,v])=>{
      doc.setFont('helvetica','bold'); doc.text(k+':', 14, y);
      doc.setFont('helvetica','normal'); doc.text(String(v), 60, y);
      y += 7;
    });
    y += 4;
    doc.setFillColor(168,32,48); doc.rect(14, y-5, 182, 7, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text('CONCEPTO', 18, y); doc.text('VALOR (COP)', 160, y);
    doc.setTextColor(20,20,23);
    y += 9;
    const conceptos = [
      ['Salario básico', '$ 1.423.500'],
      ['Auxilio de transporte', '$ 200.000'],
      ['Recargos nocturnos / dominicales', '$ 180.000'],
      ['Total devengado', '$ 1.803.500'],
      ['(-) Salud (4%)', '$ 56.940'],
      ['(-) Pensión (4%)', '$ 56.940'],
      ['Total a pagar', '$ 1.689.620'],
    ];
    doc.setFont('helvetica','normal');
    conceptos.forEach(([k,v],i)=>{
      if(i===conceptos.length-1 || k.startsWith('Total')){doc.setFont('helvetica','bold');}else{doc.setFont('helvetica','normal');}
      doc.text(k, 18, y); doc.text(v, 160, y);
      y += 7;
    });
    y += 14;
    doc.setFont('helvetica','italic'); doc.setFontSize(8);
    doc.text('Valores de referencia generados para fines demostrativos del sistema.', 14, y);
    pdfFooter(doc);
    doc.save('Comprobante_Nomina_' + emp.nombre.replace(/\s+/g,'_') + '.pdf');
  }
}

function handleLogout() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('authCard').style.display = 'block';
  document.getElementById('loginForm').reset();
  document.getElementById('errorMsg').textContent = '';
}
</script>
</body>
</html>
